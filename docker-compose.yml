services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      OPENPHOTOSENSE_CORS_ORIGINS: http://localhost:3000
      OPENPHOTOSENSE_UPLOAD_DIR: /app/uploads
    ports: ["8000:8000"]
    volumes: ["uploads:/app/uploads"]
  frontend:
    build:
      context: frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on: [backend]
    ports: ["3000:3000"]
volumes:
  uploads:

